<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 국민재난대피포털</title>
<link rel="stylesheet" href="_common.css">
<style>
.login-page-bg{background:var(--bg);min-height:calc(100vh - 230px);display:flex;align-items:center;justify-content:center;padding:48px 16px;}
.login-card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.10);padding:32px 32px 28px;border:1px solid #eef0f6;width:100%;max-width:420px;}
.lc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.lc-top h2{font-size:26px;font-weight:900;color:#1a1a1a;letter-spacing:-.5px;}
.lc-join-btn{display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid #c8d0e0;border-radius:20px;padding:7px 16px;font-size:15px;font-weight:600;color:#333;cursor:pointer;font-family:inherit;transition:all .15s;}
.lc-join-btn:hover{border-color:var(--navy);color:var(--navy);}

.lc-methods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.lc-method{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 8px 14px;border-radius:12px;cursor:pointer;transition:background .15s;border:1.5px solid transparent;}
.lc-method:hover{background:#f5f7ff;border-color:#d0d8f0;}

.lc-icon-box{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;position:relative;}
.icon-cert{background:linear-gradient(135deg,#ff7eb3 0%,#ff4e7e 100%);}
.icon-cert::before{content:'';position:absolute;width:36px;height:28px;background:rgba(255,255,255,.25);border-radius:6px;top:12px;left:14px;}
.icon-cert::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#ff2255;border:3px solid #fff;bottom:8px;right:8px;}
.icon-simple{background:linear-gradient(135deg,#a78bfa 0%,#6366f1 100%);}
.icon-simple::before{content:'';position:absolute;width:30px;height:42px;background:rgba(255,255,255,.2);border-radius:8px;top:11px;left:17px;}
.icon-simple::after{content:'🔍';position:absolute;font-size:20px;bottom:6px;right:5px;}
.icon-id{background:linear-gradient(135deg,#38bdf8 0%,#1d4ed8 100%);}
.icon-id::before{content:'';position:absolute;width:38px;height:26px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);border-radius:4px;top:14px;left:13px;}
.icon-id::after{content:'⏻';position:absolute;font-size:16px;color:#fff;bottom:8px;right:8px;}
.lc-method-name{font-size:14px;font-weight:600;color:#333;text-align:center;line-height:1.3;}

.lc-switch-wrap{min-height:217px;margin-bottom:18px;display:flex;flex-direction:column;justify-content:center;}
.lc-id-form{display:none;padding:0 0 4px;}
.lc-id-form.show{display:block;}
.btn-back-login{background:none;border:none;color:#888;font-size:13px;cursor:pointer;font-family:inherit;padding:0 0 12px;display:flex;align-items:center;gap:4px;}
.btn-back-login:hover{color:var(--navy);}
.lf-row{margin-bottom:10px;}
.lf-row input{width:100%;border:1px solid #d0d5e0;padding:11px 13px;font-size:15px;font-family:inherit;outline:none;border-radius:6px;transition:border-color .2s;box-sizing:border-box;}
.lf-row input:focus{border-color:var(--navy);}
.lf-err{background:#fff0f0;border:1px solid #fcc;color:var(--red);font-size:13px;padding:8px 12px;margin-bottom:10px;border-radius:6px;display:none;}
.lf-err.show{display:block;}
.btn-lc-do{width:100%;background:var(--navy);color:#fff;border:none;padding:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;border-radius:6px;margin-top:4px;}
.btn-lc-do:hover{background:#2a4a80;}
.lc-id-links{display:flex;justify-content:center;gap:16px;margin-top:10px;font-size:13px;}
.lc-id-links a{color:#888;}
.lc-id-links a:hover{color:var(--navy);}
.btn-other-login{width:100%;background:#f5f7ff;color:var(--navy);border:1.5px solid #c8d0e8;padding:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;border-radius:8px;transition:all .15s;}
.btn-other-login:hover{background:#eef2fb;border-color:var(--navy);}


/* ================================================
   모바일 반응형 — 행안부 스타일 기준
   768px 이하 모바일 | PC 레이아웃 그대로 유지
   ================================================ */
@media (max-width: 768px) {

  /* 정부 최상단 바 축소 */
  .govbar { height: 30px; }
  .govbar-left { font-size: 12px; gap: 5px; }
  .govbar-right { display: none; }
  .govbar-inner { padding: 0 14px; }

    /* 헤더 — 모바일: 돋보기 버튼 방식 */
  .header-inner {
    padding: 0 14px;
    height: 52px;
    flex-wrap: nowrap;
    gap: 8px;
    align-items: center;
  }
  .h-logo { min-width: 0; gap: 8px; flex: 1; }
  .h-logo-mark { width: 34px; height: 34px; flex-shrink: 0; }
  .h-logo-mark svg { width: 22px; height: 22px; }
  .h-logo-texts strong { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  .h-logo-texts span { display: none; }
  .h-userinfo { flex-shrink: 0; display: flex; align-items: center; gap: 4px; margin-left: auto; }
  .h-username { font-size: 12px; }
  .btn-join, .btn-logout { font-size: 12px; padding: 5px 9px; border-radius: 4px; }


  /* 네비게이션 — 2줄 3개씩 배치 */
  .main-nav { height: auto; border-bottom: 3px solid var(--red); }
  .main-nav-inner {
    padding: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    height: auto;
    gap: 0;
  }
  .nav-item {
    flex: none;
    height: 44px;
    font-size: 13px;
    font-weight: 700;
    border-right: 1px solid rgba(255,255,255,.12);
    border-bottom: 1px solid rgba(255,255,255,.08);
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .nav-item:nth-child(3) { border-right: none; }
  .nav-item:nth-child(4),
  .nav-item:nth-child(5),
  .nav-item:nth-child(6) { border-bottom: none; }
  .nav-item:nth-child(6) { border-right: none; }

  /* 긴급 재난 띠 */
  .emg-strip .wrap { font-size: 12px; padding: 0 14px; gap: 8px; }
  .emg-tag { font-size: 11px; padding: 2px 7px; white-space: nowrap; }

  /* 페이지 히어로 */
  .page-hero { padding: 18px 0; }
  .page-hero-inner { padding: 0 14px; flex-direction: column; gap: 6px; }
  .page-hero h1 { font-size: 20px; }
  .page-hero p { font-size: 13px; }

  /* 경로 바 */
  .ptbar { padding: 8px 14px; }
  .ptbar-inner { font-size: 12px; }

  /* wrap */
  .wrap { padding: 0 14px; }

  /* 섹션 타이틀 */
  .sec-ttl { font-size: 16px; padding: 14px 0 10px; }

  /* 푸터 */
  footer { padding: 16px 0; }
  footer .wrap { flex-direction: column; gap: 6px; text-align: center; font-size: 12px; }
  .ft-links { flex-wrap: wrap; justify-content: center; gap: 8px; }
  .ft-links a { font-size: 12px; }

  /* 공통 모달 */
  .modal-bg .modal { width: 96vw !important; max-height: 90vh; overflow-y: auto; }
  .modal-form { grid-template-columns: 1fr !important; }
}

@media (max-width: 768px) {
  .login-page-bg { padding: 24px 0; background: #f5f7fa; min-height: calc(100vh - 130px); }
  .login-card { border-radius: 0; box-shadow: none; padding: 28px 18px 24px; max-width: 100%; background: #fff; }
  .lc-top h2 { font-size: 22px; }
  .lc-join-btn { font-size: 13px; padding: 6px 14px; border-radius: 5px; }
  .lf-row { margin-bottom: 12px; }
  .lf-row input { font-size: 16px; padding: 14px 14px; border-radius: 8px; }
  .btn-lc-do { font-size: 16px; padding: 14px; border-radius: 8px; margin-top: 6px; }
  .lc-id-links { font-size: 13px; margin-top: 12px; }
  .btn-other-login { font-size: 14px; padding: 12px; border-radius: 8px; margin-top: 12px; }
  .lc-methods { gap: 10px; }
  .lc-method { padding: 16px 8px 14px; border-radius: 10px; }
  .lc-icon-box { width: 56px; height: 56px; border-radius: 14px; }
  .lc-method-name { font-size: 13px; }
}

</style>
</head>
<body>


<!-- 정부 최상단 바 -->
<div class="govbar">
  <div class="govbar-inner">
    <div class="govbar-left"><span class="taeguk"></span>이 누리집은 대한민국 공식 전자정부 누리집입니다.</div>
    <div class="govbar-right"><a href="#">ENGLISH</a><span>|</span><a href="#">어린이</a><span>|</span><a href="#">사이트맵</a><span>|</span><a href="#">안내도우미</a></div>
  </div>
</div>

<!-- 헤더 -->
<header>
  <div class="header-inner">
    <a href="index.html" class="h-logo">
      <div class="h-logo-mark">
        <svg viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="16" fill="#1d3461" stroke="#4a6fa5" stroke-width="1"/><path d="M17 5 A12 12 0 0 1 29 17 A12 12 0 0 0 17 5Z" fill="#c8102e" opacity=".85"/><path d="M17 29 A12 12 0 0 1 5 17 A12 12 0 0 0 17 29Z" fill="#c8102e" opacity=".85"/><circle cx="17" cy="17" r="4" fill="#fff"/><circle cx="17" cy="17" r="7" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.2"/></svg>
      </div>
      <div class="h-logo-texts">
        <strong>국민재난대피포털</strong>
        <span>국민 재난 대피 안전 서비스</span>
      </div>
    </a>
    <div class="h-userinfo" id="hdrUtil"></div>
  </div>
</header>

<!-- 주메뉴 -->
<nav class="main-nav">
  <div class="main-nav-inner">
    <a class="nav-item" href="dashboard.html">재난현황</a>
    <a class="nav-item" href="shelter.html">대피소 찾기</a>
    <a class="nav-item" href="family.html">가족 찾기</a>
    <a class="nav-item" href="checklist.html">재난 대비</a>
    <a class="nav-item" href="guide.html">국민행동요령</a>
    <a class="nav-item" href="alerts.html">재난문자</a>
  </div>
</nav>

<!-- 브레드크럼 -->
<div class="ptbar">
  <div class="ptbar-inner"><a href="index.html">홈</a> &gt; <span class="curr">로그인</span></div>
</div>

<!-- 로그인 폼 -->
<div class="login-page-bg">
  <div class="login-card">
    <div class="lc-top">
      <h2>로그인</h2>
      <button class="lc-join-btn" onclick="location.href='signup.html'">회원가입 ›</button>
    </div>

    <div class="lc-switch-wrap">
      <!-- 3가지 로그인 방식 -->
      <div class="lc-methods" id="lcMethods">
        <div class="lc-method" onclick="showOther('cert')">
          <div class="lc-icon-box icon-cert"></div>
          <span class="lc-method-name">공동·금융인증</span>
        </div>
        <div class="lc-method" onclick="showOther('simple')">
          <div class="lc-icon-box icon-simple"></div>
          <span class="lc-method-name">간편인증</span>
        </div>
        <div class="lc-method" onclick="showIdLogin()">
          <div class="lc-icon-box icon-id"></div>
          <span class="lc-method-name">아이디 로그인</span>
        </div>
      </div>

      <!-- 아이디 로그인 폼 -->
      <div class="lc-id-form" id="idLoginForm">
        <button class="btn-back-login" onclick="backToMethods()">← 다른 방법으로 로그인</button>
        <div class="lf-err" id="lcErr">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        <div class="lf-row"><input type="text" id="lcId" placeholder="아이디" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div class="lf-row"><input type="password" id="lcPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="btn-lc-do" onclick="doLogin()">로그인</button>
        <div class="lc-id-links">
          <a href="#">아이디 찾기</a><a href="#">비밀번호 찾기</a>
        </div>
      </div>
    </div>

    <button class="btn-other-login" onclick="alert('공동인증서·카카오·네이버 간편인증 등 다양한 로그인을 지원합니다.')">다른 로그인 안내</button>
  </div>
</div>

<!-- 푸터 -->
<footer>
  <div class="wrap">
    <span>© 2026 국민재난대피포털 · 행정안전부 국가재난안전관리본부</span>
    <div class="ft-links">
      <a href="#">이용약관</a><a href="#">개인정보처리방침</a><a href="#">저작권정책</a><a href="#">문의: 재난안전 119</a>
    </div>
  </div>
</footer>

<script>
// [더미] 백엔드 연결 시 제거 — POST /api/auth/login 응답으로 대체
const ADMINS={manager:'manager1234',admin2:'admin2024'};
const ANAMES={manager:'김담당 (재난관리팀)',admin2:'이운영 (시설관리팀)'};

function initHeader(){
  const raw=sessionStorage.getItem('user');
  const el=document.getElementById('hdrUtil');
  if(!el)return;
  if(raw){
    try{
      const u=JSON.parse(raw);
      el.innerHTML=`<span class="h-username">${u.name||'사용자'} 님</span><button class="btn-logout" onclick="sessionStorage.clear();location.href='index.html'">로그아웃</button>`;
    }catch(e){}
  }
}
function hdrSearch(){const q=document.getElementById('hdrSrch').value.trim();if(q)alert(`"${q}" 검색 기능은 준비 중입니다.`);}
initHeader();

function showIdLogin(){
  document.getElementById('lcMethods').style.display='none';
  document.getElementById('idLoginForm').classList.add('show');
}
function backToMethods(){
  document.getElementById('lcMethods').style.display='';
  document.getElementById('idLoginForm').classList.remove('show');
}
function showOther(type){
  if(type==='cert') alert('공동인증서(구 공인인증서) 및 금융인증서로 로그인합니다.\n(데모: 아이디 로그인을 이용해주세요)');
  else alert('카카오·네이버·PASS 간편인증으로 로그인합니다.\n(데모: 아이디 로그인을 이용해주세요)');
}
function doLogin(){
  const id=document.getElementById('lcId').value.trim();
  const pw=document.getElementById('lcPw').value;
  if(!id||!pw){alert('아이디와 비밀번호를 입력하세요.');return;}
  if(ADMINS[id]===pw){
    sessionStorage.setItem('adminLoggedIn','true');
    sessionStorage.setItem('adminId',id);
    sessionStorage.setItem('adminName',ANAMES[id]||id);
    window.location.href='admin.html';
    return;
  }
  if(pw.length>=4){
    sessionStorage.setItem('user',JSON.stringify({name:'김안전',phone:id}));
    window.location.href='index.html';
  } else {
    document.getElementById('lcErr').classList.add('show');
  }
}


</script>
</body>
</html>
