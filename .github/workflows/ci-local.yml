name: CI

on:
  push:
    branches: [deploy/local]
  pull_request:
    branches: [deploy/local]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check forbidden patterns
        run: |
          FILES="safespot-front/frontend/index.html safespot-front/frontend/login.html safespot-front/frontend/alerts.html safespot-front/frontend/shelter.html safespot-front/frontend/admin.html"
          FAIL=0
          for f in $FILES; do
            if grep -q 'fetch(' "$f"; then
              echo "FAIL: raw fetch() found in $f"
              FAIL=1
            fi
            if grep -q 'API_BASE' "$f"; then
              echo "FAIL: API_BASE found in $f"
              FAIL=1
            fi
            if grep -q 'sessionStorage' "$f"; then
              echo "FAIL: sessionStorage found in $f"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Check required script includes
        run: |
          FILES="safespot-front/frontend/index.html safespot-front/frontend/login.html safespot-front/frontend/alerts.html safespot-front/frontend/shelter.html safespot-front/frontend/admin.html"
          FAIL=0
          for f in $FILES; do
            for script in 'src="config.js"' 'src="js/auth.js"' 'src="js/api-client.js"'; do
              if ! grep -q "$script" "$f"; then
                echo "FAIL: $script not found in $f"
                FAIL=1
              fi
            done
          done
          exit $FAIL

  build:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push safespot-nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/project-safespot/safespot-nginx:local-${{ steps.sha.outputs.short }}

  update-manifest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout k8s-manifest
        uses: actions/checkout@v4
        with:
          repository: project-safespot/safespot-application-k8s-manifest
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: k8s-manifest

      - name: Update nginx image tag in values-dev.yaml
        env:
          SHORT_SHA: ${{ needs.build.outputs.short-sha }}
        run: |
          cd k8s-manifest
          yq e '.nginx.image.tag = strenv(SHORT_SHA)' -i charts/safespot/values-local.yaml

      - name: Commit and push if changed
        env:
          SHORT_SHA: ${{ needs.build.outputs.short-sha }}
        run: |
          cd k8s-manifest
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest changes detected, skipping commit."
          else
            git add charts/safespot/values-dev.yaml
            git commit -m "chore: update nginx image tag to ${SHORT_SHA}"
            git push
          fi
